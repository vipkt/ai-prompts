name: Update README prompts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 1"

permissions:
  contents: write

jobs:
  update-readmes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update README prompts blocks
        run: python scripts/update_readme_prompts.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update README prompts"
          git push
